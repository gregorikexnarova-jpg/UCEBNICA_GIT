name: Generate PDF
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Typst
        uses: typst-community/setup-typst@v4
        with:
          typst-version: 0.11.x

      - name: Compile PDF
        run: typst compile main.typ ucebnica_informatiky.pdf

      - name: Upload PDF Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ucebnica-pdf
          path: ucebnica_informatiky.pdf
